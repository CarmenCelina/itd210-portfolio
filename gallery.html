    <main>
 
   <div class="page-title">
     <h1><i class="ph-fill ph-map-trifold" aria-hidden="true"></i> Where to travel next?</h1>
   </div>
   <!--This is a grid with 9 pictures and that span based on the 12 grid-->
    <section class="big_grid" aria-label="Photo Gallery"> <!-- start of grid box and aria label to help accessibility-->
        <!-- tabindex="0" lets keyboard users tab to this image card
     required so hover effects also work on keyboard focus -->
    <figure class="grid_6" tabindex="0"> <!--figure is used for images with captions-->
        <img src="images/miami_beach.jpg" alt="picture of beach in miami that shows eagle view of city & beach" loading="lazy"> <!-- loading lazy means dont load image until user scrolls to it, makes page faster -->
        <div class="overlay" aria-hidden="true">Miami Beach</div>
        <figcaption> Miami Beach</figcaption>
    </figure>
   <!-- Image 2: Family (Events) -->
            <figure class="grid_6" tabindex="0">
                <img src="images/familypic.jpg"
                     alt="Family packing their bags and getting ready to go on vacation"
                     loading="lazy">
                <div class="overlay" aria-hidden="true">Family Travel</div>
                <figcaption>Family Groups</figcaption>
            </figure>
 
            <!-- Image 3: New York(Destinations) -->
            <figure class="grid_8" tabindex="0">
                <img src="images/newYork.jpg"
                     alt="New York City skyscrapers photographed during the daytime"
                     loading="lazy">
                <div class="overlay" aria-hidden="true">New York City</div>
                <figcaption> New York City</figcaption>
            </figure>
 
            <!-- Image 4: Wedding ( Events) -->
            <figure class="grid_4" tabindex="0">
                <img src="images/weddingpic.jpg"
                     alt="Married couple waving from a charter bus surrounded by guests"
                     loading="lazy">
                <div class="overlay" aria-hidden="true">Wedding Transport</div>
                <figcaption> Weddings</figcaption>
            </figure>
 
            <!-- Image 5: Myrtle Beach Destinations -->
            <figure class="grid_8" tabindex="0">
                <img src="images/myrtleBeach.jpg"
                     alt="Aerial view of Myrtle Beach showing the ferris wheel and rides"
                     loading="lazy">
                <div class="overlay" aria-hidden="true">Myrtle Beach</div>
                <figcaption>Myrtle Beach</figcaption>
            </figure>
 
            <!-- Image 6: WiFi  Amenities -->
            <figure class="grid_4" tabindex="0">
                <img src="images/wifi.jpg"
                     alt="iPhone screen displaying the WiFi connection symbol"
                     loading="lazy">
                <div class="overlay" aria-hidden="true">Free WiFi Onboard</div>
                <figcaption>Free WiFi</figcaption>
            </figure>
 
            <!-- Image 7: Bus Interior -->
            <figure class="grid_6" tabindex="0">
                <img src="images/bus_inside1.png"
                     alt="Inside of charter bus showing navy seats with white accents"
                     loading="lazy">
                <div class="overlay" aria-hidden="true">Premium Interior</div>
                <figcaption>Bus Interior</figcaption>
            </figure>
 
            <!-- Image 8: Virginia Beach — Destinations -->
            <figure class="grid_6" tabindex="0">
                <img src="images/vaBeach.jpg"
                     alt="Seafood shack on the Virginia Beach boardwalk"
                     loading="lazy">
                <div class="overlay" aria-hidden="true">Virginia Beach</div>
                <figcaption> Virginia Beach</figcaption>
            </figure>
 
            <!-- Image 9: Bus Exterior — (full width) I wanted to added to emphasis the ride -->
            <figure class="grid_12" tabindex="0">
                <img src="images/editHero.png"
                     alt="Exterior of the SuperTours charter bus with orange color scheme"
                     loading="lazy">
                <div class="overlay" aria-hidden="true">Our Charter Bus</div>
                <figcaption> Bus Exterior</figcaption>
            </figure>
 
        </section>
    
    </main>
